<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANIC BUTTON RT 05</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at center, #2c2c2c 0%, #1a1a1a 100%); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .container { text-align: center; max-width: 400px; padding: 20px; position: relative; }
        
        /* SEARCHABLE DROPDOWN */
        .search-container { position: relative; text-align: left; }
        .suggestion-box { 
            position: absolute; 
            top: 100%; left: 0; right: 0; 
            background: #2a2a2a; 
            border-radius: 0 0 15px 15px; 
            border: 1px solid #444;
            max-height: 250px; 
            overflow-y: auto; 
            z-index: 2000; 
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: -5px;
        }
        .suggestion-item { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-bottom: 1px solid #383838; 
            transition: 0.2s; 
        }
        .suggestion-item:hover { background: #d32f2f; }
        .suggestion-item .unit-num { font-weight: 800; display: block; font-size: 1rem; color: #fff; }
        .suggestion-item .warga-name { font-size: 0.8rem; color: #aaa; }

        /* INPUT STYLE */
        #searchInput {
            border-radius: 15px;
            border: 2px solid #444;
            background: #222;
            color: white;
            padding: 15px;
            font-weight: 600;
        }
        #searchInput:focus {
            border-color: #d32f2f;
            box-shadow: none;
            border-radius: 15px 15px 0 0;
        }

        /* PANIC BUTTON ANIMATION */
        .btn-panic {
            width: 230px; height: 230px; border-radius: 50%;
            background: radial-gradient(circle, #ff4b2b 0%, #dc3545 100%);
            border: 12px solid #550000; 
            color: white; 
            font-weight: 800; 
            font-size: 26px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            animation: pulse-red 2s infinite; 
            cursor: pointer;
            text-transform: uppercase;
            user-select: none;
        }
        .btn-panic:active { transform: scale(0.9); animation: none; background: #900; }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 25px rgba(220, 53, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .unit-display { font-size: 1.4rem; margin-bottom: 25px; color: #ffc107; font-weight: 800; text-shadow: 0 2px 10px rgba(255,193,7,0.4); }
        #setupView, #panicView { display: none; }
        
        /* Teks Keterangan yang Diperbaiki Kontrasnya */
        .instruction-text { 
            font-size: 0.85rem; 
            color: #cccccc; /* Warna lebih terang agar kontras dengan background */
            margin-top: 2rem;
            line-height: 1.5;
        }
        
        .loader-text { font-size: 0.85rem; color: #bbb; margin-top: 15px; }
        .spinner-border-custom { width: 3rem; height: 3rem; color: #d32f2f; }

        /* RESET BUTTON STYLE (Sekarang terlihat seperti tombol) */
        .btn-reset-identity { 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff !important; 
            font-weight: 600; 
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-reset-identity:hover { 
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffc107;
            color: #ffc107 !important; 
            transform: translateY(-2px);
        }

        /* CUSTOM MODAL STYLE */
        .modal-content { background: #2a2a2a; color: white; border-radius: 20px; border: 1px solid #444; }
        .modal-header { border-bottom: 1px solid #383838; }
        .modal-footer { border-top: 1px solid #383838; }
        .btn-confirm { background: #d32f2f; color: white; border: none; font-weight: 700; border-radius: 10px; padding: 10px 25px; }
        .btn-cancel { background: #444; color: white; border: none; font-weight: 600; border-radius: 10px; padding: 10px 25px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <i class="fas fa-shield-alt fa-4x mb-3 text-danger"></i>
        <h3 class="fw-bold mb-1">Aktivasi Tombol</h3>
        <p class="small mb-4" style="color: #bbb;">Cari Unit atau Nama Anda untuk mengunci identitas Panic Button ini.</p>
        
        <div class="search-container mb-4" id="searchArea">
            <input type="text" id="searchInput" class="form-control form-control-lg" 
                   placeholder="Ketik Nama / Unit..." autocomplete="off" oninput="filterWarga(this.value)">
            <div id="suggestionBox" class="suggestion-box"></div>
        </div>
        
        <div id="loadingData" class="loader-text">
            <div class="spinner-border spinner-border-sm text-danger me-2"></div> Menghubungkan ke database RT 05...
        </div>
    </div>

    <div id="panicView">
        <div class="unit-display" id="displayUnit">UNIT: --</div>
        <div class="btn-panic mx-auto" id="mainButton" onclick="askPanic()">
            <i class="fas fa-bullhorn mb-2" style="font-size: 45px;"></i>
            <span>PANIC<br>BUTTON</span>
        </div>
        <div class="instruction-text">
            <p><b>KONDISI DARURAT, BUTUH BANTUAN?</b><br>
            Tekan tombol di atas. Sinyal akan dikirim ke Grup Warga & Seluruh Pengurus.</p>
        </div>
        <button class="btn mt-4 text-decoration-none btn-reset-identity" onclick="askReset()">
            <i class="fas fa-sync-alt me-1"></i> Ganti Alamat Unit
        </button>
    </div>
</div>

<div class="modal fade" id="modalAlert" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content text-center p-3">
            <div class="modal-body">
                <i id="alertIcon" class="fas fa-info-circle fa-3x mb-3"></i>
                <p id="alertMessage" class="fw-bold"></p>
                <button type="button" class="btn-confirm w-100" data-bs-dismiss="modal">OKE</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalConfirm" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
            <div class="modal-body">
                <i id="confirmIcon" class="fas fa-question-circle fa-3x mb-3 text-warning"></i>
                <h5 id="confirmTitle" class="fw-bold mb-2">Konfirmasi</h5>
                <p id="confirmMessage" class="small mb-4" style="color: #bbb;"></p>
                <div class="d-flex gap-2">
                    <button type="button" class="btn-cancel flex-fill" data-bs-dismiss="modal">BATAL</button>
                    <button type="button" id="confirmActionBtn" class="btn-confirm flex-fill">YA, LANJUT</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwyr-5fO-Pql3inAQ2yLhwgbV9xngSUgTkSAhIotfFPlJPlRNzg3BbDCKZLjHhS0kQJ/exec"; 
    let WARGA_LIST = {};
    const alertMdl = new bootstrap.Modal(document.getElementById('modalAlert'));
    const confirmMdl = new bootstrap.Modal(document.getElementById('modalConfirm'));

    window.onload = () => {
        const saved = localStorage.getItem('rt05_unit');
        if (saved) {
            showPanicView(saved);
        } else {
            fetchWarga();
        }

        document.addEventListener('click', function(e) {
            if (document.getElementById('searchArea') && !document.getElementById('searchArea').contains(e.target)) {
                document.getElementById('suggestionBox').style.display = 'none';
            }
        });
    };

    function showAlert(msg, isSuccess = true) {
        document.getElementById('alertMessage').innerText = msg;
        const icon = document.getElementById('alertIcon');
        icon.className = isSuccess ? "fas fa-check-circle fa-3x mb-3 text-success" : "fas fa-exclamation-circle fa-3x mb-3 text-danger";
        alertMdl.show();
    }

    function fetchWarga() {
        document.getElementById('setupView').style.display = 'block';
        fetch(`${GAS_URL}?action=getWarga`)
            .then(res => res.json())
            .then(data => {
                WARGA_LIST = data;
                document.getElementById('loadingData').style.display = 'none';
            })
            .catch(err => {
                document.getElementById('loadingData').innerHTML = "<span class='text-danger'>Gagal memuat database. Cek koneksi internet.</span>";
            });
    }

    function filterWarga(val) {
        const box = document.getElementById('suggestionBox');
        if (val.length < 1) { box.style.display = 'none'; return; }
        const matches = Object.keys(WARGA_LIST).filter(unit => {
            const nama = WARGA_LIST[unit] ? WARGA_LIST[unit].toLowerCase() : "";
            return unit.toLowerCase().includes(val.toLowerCase()) || nama.includes(val.toLowerCase());
        });
        if (matches.length > 0) {
            box.innerHTML = matches.slice(0, 10).map(unit => `
                <div class="suggestion-item" onclick="selectWarga('${unit}')">
                    <span class="unit-num">${unit}</span>
                    <span class="warga-name">${WARGA_LIST[unit]}</span>
                </div>
            `).join('');
            box.style.display = 'block';
        } else { box.style.display = 'none'; }
    }

    function selectWarga(unit) {
        localStorage.setItem('rt05_unit', unit);
        localStorage.setItem('rt05_nama', WARGA_LIST[unit]);
        showPanicView(unit);
    }

    function showPanicView(unit) {
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('panicView').style.display = 'block';
        document.getElementById('displayUnit').innerText = "UNIT: " + unit;
    }

    function askReset() {
        document.getElementById('confirmTitle').innerText = "Ganti Identitas?";
        document.getElementById('confirmMessage').innerText = "Apakah Anda yakin ingin mengganti data unit rumah di perangkat ini?";
        document.getElementById('confirmIcon').className = "fas fa-sync-alt fa-3x mb-3 text-info";
        document.getElementById('confirmActionBtn').onclick = () => {
            localStorage.clear();
            location.reload();
        };
        confirmMdl.show();
    }

    function askPanic() {
        document.getElementById('confirmTitle').innerText = "KIRIM SINYAL?";
        document.getElementById('confirmMessage').innerText = "KIRIM SINYAL DARURAT SEKARANG?\nData bantuan akan masuk ke Grup Warga & Pengurus.";
        document.getElementById('confirmIcon').className = "fas fa-exclamation-triangle fa-3x mb-3 text-danger";
        document.getElementById('confirmActionBtn').onclick = () => {
            confirmMdl.hide();
            sendPanic();
        };
        confirmMdl.show();
    }

    function sendPanic() {
        const unit = localStorage.getItem('rt05_unit');
        const btn = document.getElementById('mainButton');
        btn.onclick = null;
        btn.style.animation = 'none';
        btn.innerHTML = '<div class="spinner-border spinner-border-custom"></div>';

        fetch(`${GAS_URL}?action=panic&unit=${unit}`)
            .then(res => res.json())
            .then(data => {
                showAlert(data.message, true);
                document.getElementById('modalAlert').addEventListener('hidden.bs.modal', () => { location.reload(); }, {once: true});
            })
            .catch(err => {
                showAlert("Gagal terhubung. Pastikan internet aktif.", false);
                document.getElementById('modalAlert').addEventListener('hidden.bs.modal', () => { location.reload(); }, {once: true});
            });
    }
</script>

</body>
</html>
