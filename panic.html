<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANIC BUTTON RT 05</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        
        /* SEARCHABLE DROPDOWN */
        .search-container { position: relative; text-align: left; }
        .suggestion-box { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: #2a2a2a; border-radius: 12px; border: 1px solid #444;
            max-height: 200px; overflow-y: auto; z-index: 1000; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-top: 5px;
        }
        .suggestion-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #333; transition: 0.2s; }
        .suggestion-item:hover { background: #d32f2f; color: white; }
        .suggestion-item .unit-num { font-weight: 800; display: block; font-size: 0.9rem; }
        .suggestion-item .warga-name { font-size: 0.75rem; opacity: 0.7; }

        /* PANIC BUTTON ANIMATION */
        .btn-panic {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, #ff4b2b 0%, #dc3545 100%);
            border: 10px solid #550000; color: white; font-weight: 800; font-size: 24px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            animation: pulse-red 2s infinite; cursor: pointer; border: none;
        }
        .btn-panic:active { transform: scale(0.9); animation: none; }

        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(220, 53, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .unit-display { font-size: 1.3rem; margin-bottom: 20px; color: #ffc107; font-weight: 800; text-shadow: 0 2px 10px rgba(255,193,7,0.3); }
        #setupView, #panicView { display: none; }
        .loader-text { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <i class="fas fa-shield-alt fa-3x mb-3 text-danger"></i>
        <h4 class="fw-bold">Aktivasi Tombol Darurat</h4>
        <p class="small text-secondary mb-4">Cari Unit Rumah atau Nama Anda untuk mengaktifkan fitur Panic Button.</p>
        
        <div class="search-container mb-4">
            <input type="text" id="searchInput" class="form-control form-control-lg bg-dark text-white border-secondary" 
                   placeholder="Ketik Unit atau Nama..." autocomplete="off" oninput="filterWarga(this.value)">
            <div id="suggestionBox" class="suggestion-box"></div>
        </div>
        
        <div id="loadingData" class="loader-text">
            <div class="spinner-border spinner-border-sm text-danger me-2"></div> Menghubungkan ke database RT 05...
        </div>
    </div>

    <div id="panicView">
        <div class="unit-display" id="displayUnit">UNIT: --</div>
        <button class="btn-panic mx-auto" id="mainButton" onclick="sendPanic()">
            <i class="fas fa-bullhorn mb-2" style="font-size: 40px;"></i>
            <span>PANIC<br>BUTTON</span>
        </button>
        <p class="mt-4 small text-secondary"><b>SITUASI DARURAT?</b><br>Tekan tombol untuk bantuan pengurus & warga.</p>
        <button class="btn btn-link btn-sm text-muted mt-5 text-decoration-none" onclick="resetAddress()">
            <i class="fas fa-sync-alt me-1"></i> Ganti Identitas Unit
        </button>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwyr-5fO-Pql3inAQ2yLhwgbV9xngSUgTkSAhIotfFPlJPlRNzg3BbDCKZLjHhS0kQJ/exec"; // GANTI INI
    let WARGA_LIST = {};

    window.onload = () => {
        const saved = localStorage.getItem('rt05_unit');
        if (saved) {
            showPanicView(saved);
        } else {
            fetchWarga();
        }
    };

    function fetchWarga() {
        document.getElementById('setupView').style.display = 'block';
        fetch(`${GAS_URL}?action=getWarga`)
            .then(res => res.json())
            .then(data => {
                WARGA_LIST = data;
                document.getElementById('loadingData').style.display = 'none';
                document.getElementById('searchInput').placeholder = "Cari Unit (Contoh: F1-07)";
            })
            .catch(err => {
                document.getElementById('loadingData').innerHTML = "<span class='text-danger'>Gagal memuat database. Cek koneksi internet.</span>";
            });
    }

    function filterWarga(val) {
        const box = document.getElementById('suggestionBox');
        if (val.length < 1) { box.style.display = 'none'; return; }

        const matches = Object.keys(WARGA_LIST).filter(unit => {
            const nama = WARGA_LIST[unit].toLowerCase();
            return unit.toLowerCase().includes(val.toLowerCase()) || nama.includes(val.toLowerCase());
        });

        if (matches.length > 0) {
            box.innerHTML = matches.slice(0, 10).map(unit => `
                <div class="suggestion-item" onclick="selectWarga('${unit}')">
                    <span class="unit-num">${unit}</span>
                    <span class="warga-name">${WARGA_LIST[unit]}</span>
                </div>
            `).join('');
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    function selectWarga(unit) {
        localStorage.setItem('rt05_unit', unit);
        localStorage.setItem('rt05_nama', WARGA_LIST[unit]);
        showPanicView(unit);
    }

    function showPanicView(unit) {
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('panicView').style.display = 'block';
        document.getElementById('displayUnit').innerText = "UNIT: " + unit;
    }

    function resetAddress() {
        if(confirm("Apakah Anda yakin ingin mengganti data unit rumah?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function sendPanic() {
        const unit = localStorage.getItem('rt05_unit');
        const nama = localStorage.getItem('rt05_nama');
        const btn = document.getElementById('mainButton');

        if(!confirm("KIRIM SINYAL DARURAT SEKARANG?\nLaporan akan masuk ke Grup Warga & Pengurus.")) return;

        btn.disabled = true;
        btn.style.animation = 'none';
        btn.innerHTML = '<div class="spinner-border text-white"></div>';

        fetch(`${GAS_URL}?action=panic&unit=${unit}`)
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                location.reload(); // Refresh untuk reset state tombol
            })
            .catch(err => {
                alert("Gagal terhubung. Pastikan internet aktif.");
                location.reload();
            });
    }
</script>

</body>
</html>
