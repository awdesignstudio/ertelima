<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANIC BUTTON RT 05</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 400px; padding: 20px; }
        
        /* State Setup */
        #setupView { display: none; }
        
        /* State Panic */
        #panicView { display: none; }
        
        .btn-panic {
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, #ff4b2b 0%, #dc3545 100%);
            border: 10px solid #550000; box-shadow: 0 0 50px rgba(220, 53, 69, 0.5);
            color: white; font-weight: 800; font-size: 24px; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-panic:active { transform: scale(0.9); box-shadow: 0 0 10px rgba(220, 53, 69, 0.8); }
        
        .unit-display { font-size: 1.2rem; margin-bottom: 20px; color: #ffc107; font-weight: bold; }
        .loader { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView">
        <i class="fas fa-home fa-3x mb-3 text-secondary"></i>
        <h4 class="fw-bold">Aktivasi Panic Button</h4>
        <p class="small text-secondary">Masukkan nomor unit Anda sekali saja untuk keperluan darurat.</p>
        <input type="text" id="inputUnit" class="form-control form-control-lg text-center mb-3" placeholder="Contoh: F1-07">
        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="saveAddress()">AKTIFKAN SEKARANG</button>
    </div>

    <div id="panicView">
        <div class="unit-display" id="displayUnit">UNIT: --</div>
        <button class="btn-panic mx-auto" id="mainButton" onclick="sendPanic()">
            <i class="fas fa-hand-pointer mb-2"></i>
            <span>PANIC<br>BUTTON</span>
        </button>
        <p class="mt-4 small text-secondary">Tekan tombol di atas untuk mengirim sinyal bantuan ke grup warga & pengurus.</p>
        <button class="btn btn-link btn-sm text-secondary mt-5" onclick="resetAddress()">Ganti Nomor Unit</button>
    </div>

    <div id="loaderArea" class="mt-3 loader text-warning">
        <div class="spinner-border spinner-border-sm me-2"></div> Mengirim Sinyal...
    </div>
</div>

<script>
    // GANTI DENGAN URL WEB APP GAS BAPAK
    const GAS_URL = "URL_WEB_APP_GAS_BAPAK";

    window.onload = () => {
        checkStatus();
    };

    function checkStatus() {
        const savedUnit = localStorage.getItem('rt05_unit');
        if (savedUnit) {
            document.getElementById('displayUnit').innerText = "UNIT: " + savedUnit;
            document.getElementById('panicView').style.display = 'block';
            document.getElementById('setupView').style.display = 'none';
        } else {
            document.getElementById('setupView').style.display = 'block';
            document.getElementById('panicView').style.display = 'none';
        }
    }

    function saveAddress() {
        const val = document.getElementById('inputUnit').value.trim().toUpperCase();
        if (val) {
            localStorage.setItem('rt05_unit', val);
            checkStatus();
        } else {
            alert("Masukkan nomor unit!");
        }
    }

    function resetAddress() {
        if(confirm("Ganti nomor unit rumah?")) {
            localStorage.removeItem('rt05_unit');
            checkStatus();
        }
    }

    function sendPanic() {
        const unit = localStorage.getItem('rt05_unit');
        const btn = document.getElementById('mainButton');
        const loader = document.getElementById('loaderArea');

        if(!confirm("Kirim sinyal darurat sekarang?")) return;

        btn.disabled = true;
        loader.style.display = 'block';

        fetch(`${GAS_URL}?action=panic&unit=${unit}`)
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                btn.disabled = false;
                loader.style.display = 'none';
            })
            .catch(err => {
                alert("Gagal terhubung ke sistem. Pastikan koneksi internet aktif.");
                btn.disabled = false;
                loader.style.display = 'none';
            });
    }
</script>

</body>
</html>
